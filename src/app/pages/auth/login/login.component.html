<div class="d-flex flex-column flex-grow-1">
    <div class="row g-0 flex-grow-1">
        
        <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-login-image">
            <div class="p-5 text-center text-white">
                <img src="assets/red-transparente.png" alt="Red Speakweb" class="mb-4" style="width: 180px; opacity: 0.85;">
                <h2 class="display-4 fw-bold">Speakweb</h2>
                <p class="lead mt-3">Conecta. Practica. Aprende.</p>
            </div>
        </div>

        <div class="col-md-6 bg-white d-flex align-items-center justify-content-center">
            
            <div class="w-100 p-5" style="max-width: 500px;">
                
                <div class="text-center mb-4">
                    <h3 class="text-brand fw-bold">Bienvenido a Speakweb</h3>
                    <p class="text-muted">Pruébalo sin registrarte</p>
                </div>

                <div class="d-grid mb-2">
                    <button type="button" (click)="joinAsGuest()" class="btn btn-brand btn-lg w-100 py-3 text-white shadow">
                        Entrar como invitado
                    </button>
                </div>
                <p class="text-center text-muted small mb-4">Acceso de demostración. No se guardan tus datos.</p>

                <!-- login oculto: solo aparece entrando con /login?acceso=1 -->
                @if (showLoginForm) {
                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 text-muted">
                        <span class="px-3 text-muted small">accede con tu cuenta</span>
                        <hr class="flex-grow-1 text-muted">
                    </div>

                    <form (ngSubmit)="onLogin()">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Email</label>
                            <input type="email" [(ngModel)]="loginObj.email" name="email"
                                   class="form-control bg-light"
                                   placeholder="usuario@speakweb.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Contraseña</label>
                            <input type="password" [(ngModel)]="loginObj.password" name="password"
                                   class="form-control bg-light"
                                   placeholder="******" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-outline-brand w-100 py-2">
                                Iniciar sesión
                            </button>
                        </div>
                    </form>
                }

                <!-- registro oculto. Descomentar para recuperarlo -->
                <!--
                <div class="text-center mt-3">
                    <span class="text-muted small">¿No tienes cuenta? </span>
                    <a routerLink="/register" class="text-brand fw-bold text-decoration-none small">
                        Regístrate aquí
                    </a>
                </div>
                -->
            </div>
        </div>

    </div>
</div>
